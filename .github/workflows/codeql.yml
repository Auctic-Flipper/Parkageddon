name: "CodeQL"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: "0 3 * * 0" # Weekly, Sundays at 03:00 UTC

jobs:
  analyze:
    # Skip on private repos to avoid upload failures without GHAS.
    # Remove this line after making the repo public or enabling GHAS in an org.
    if: ${{ github.event.repository.private == false }}
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [ "python" ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      # Python typically doesn't need a build; optional dependency install can help analysis context
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install server dependencies (optional)
        if: hashFiles('server/requirements.txt') != ''
        run: |
          python -m pip install --upgrade pip
          pip install -r server/requirements.txt

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
