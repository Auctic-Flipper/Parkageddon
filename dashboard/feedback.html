<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feedback - Parkageddon Dashboard</title>
    <link rel="icon" type="image/png" href="Images/favicon.png">
    <link rel="stylesheet" href="CSS/feedback.css">
    <meta name="referrer" content="strict-origin-when-cross-origin" />
</head>
<body>
    <header>
        <h1>Parkageddon Dashboard</h1>
    </header>

    <nav>
        <a href="/">Home</a>
        <a href="/about">About</a>
        <a href="/feedback">Feedback</a>
        <a href="https://lipscomb.edu/engineering" target="_blank" rel="noopener noreferrer">Fields</a>
        <a href="https://lipscomb.edu" target="_blank" rel="noopener noreferrer">Lipscomb University</a>
    </nav>

    <main>
        <h2>Feedback Form</h2>
        <p class="intro">We’d love to hear your thoughts! Please fill out the form below. We do not echo your submission back to the page.</p>

        
        <form action="https://formspree.io/f/xkgqrekj" method="POST" accept-charset="UTF-8" autocomplete="on" spellcheck="true" novalidate>
            <!-- Optional subject line for emails -->
            <input type="hidden" name="_subject" value="Parkageddon feedback">

            <!-- Honeypot field - keep empty in normal use; bots may fill it -->
            <div class="hp" aria-hidden="true">
                <label for="_gotcha">Leave this field blank</label>
                <input type="text" name="_gotcha" id="_gotcha" tabindex="-1" autocomplete="off">
            </div>

            <!-- Safer to avoid reflecting submitted data back into the UI.
                 Limit lengths to reduce risk of large payloads. -->
            <label for="name">Your Name:</label>
            <input type="text" id="name" name="name" required autocomplete="name" maxlength="100" inputmode="text" aria-label="Your name">

            <label for="email">Your Email:</label>
            <input type="email" id="email" name="_replyto" required autocomplete="email" maxlength="254" aria-label="Your email">

            <label for="message">Your Message:</label>
            <textarea id="message" name="message" required placeholder="Share your thoughts..." maxlength="2000" aria-label="Your message"></textarea>

            <button type="submit">Send Feedback</button>
        </form>
    </main>

    <footer>
        &copy; 2025 Lipscomb University
    </footer>
</body>
</html>
