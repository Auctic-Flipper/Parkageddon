worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Logs
    access_log  logs/access.log;
    error_log   logs/error.log;

    upstream parkageddon_app {
        server 127.0.0.1:8000;  # Waitress
    }

    server {
        # Use 8080 to avoid admin privileges; change to 80 if you run as Administrator
        listen       8080;
        server_name  localhost;

        # Serve image assets directly from your repo
        # Use forward slashes in Windows paths
        location /Images/ {
            alias C:/Users/jorda/Documents/Github/Parkageddon/dashboard/Images/;
            add_header Cache-Control "public, max-age=3600";
            access_log off;
            expires 1h;
        }

        # Optional: favicon if you ever reference /favicon.png
        location = /favicon.png {
            alias C:/Users/jorda/Documents/Github/Parkageddon/dashboard/Images/favicon.png;
            access_log off;
            expires 1h;
        }

        # Everything else -> Flask via Waitress
        location / {
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;

            proxy_pass http://parkageddon_app;
        }
    }
}